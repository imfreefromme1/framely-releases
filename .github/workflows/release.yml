name: Release
on:
  push:
    tags:
      - v*

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: npm install
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Framely ${{ github.ref_name }}
          releaseBody: See assets below to download.
          releaseDraft: false
          prerelease: false
      - name: Notify Discord
        if: success()
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $url = "https://github.com/imfreefromme1/framely-releases/releases/tag/$tag"
          $body = @{ content = "**Framely $tag released!** $url" } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.DISCORD_WEBHOOK }}" -Method Post -ContentType "application/json" -Body $body
