<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    width: 100%;
    height: 100%;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  #overlay {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 0, 0, 0.65);
    border: 1px solid rgba(212, 170, 60, 0.4);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: grab;
    backdrop-filter: blur(4px);
  }
  #overlay:active { cursor: grabbing; }
  #dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #d4aa3c;
    box-shadow: 0 0 6px rgba(212,170,60,0.8);
    animation: pulse 2s infinite;
  }
